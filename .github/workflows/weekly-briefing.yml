name: Daily Economic Briefing

on:
  schedule:
    # 매시 정각 실행 (UTC). KST = UTC + 9.
    # 예: UTC 00:00 실행 → KST 09:00 실행 → 08:00~08:59 뉴스 수집
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "수집 대상 날짜 (YYYY-MM-DD). 비워두면 직전 1시간 자동 수집."
        required: false
        type: string
      dry_run:
        description: "외부 채널(Notion 등) 저장 없이 테스트 실행"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

# 같은 workflow가 중복 실행되지 않도록 방지
# cancel-in-progress: true → 이전 실행이 hang되어도 새 스케줄이 즉시 실행됨
concurrency:
  group: hourly-briefing
  cancel-in-progress: true

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Seoul
      NODE_ENV: production
      LOG_LEVEL: info
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      TARGET_DATE: ${{ github.event.inputs.target_date }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          NODE_ENV: development

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run briefing pipeline
        run: npm run briefing
