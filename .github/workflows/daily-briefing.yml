name: Daily Economic Briefing

on:
  schedule:
    # 19:30 UTC = 04:30 Asia/Seoul. Runs before the 05:00 KST product target.
    - cron: "30 19 * * *"
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target news date in YYYY-MM-DD. Empty means yesterday in Asia/Seoul."
        required: false
        type: string
      dry_run:
        description: "Run without publishing to external channels."
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

concurrency:
  group: daily-economic-briefing-${{ github.workflow }}-${{ github.event.inputs.target_date || github.ref }}
  cancel-in-progress: false

jobs:
  run-daily-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      TZ: Asia/Seoul
      NODE_ENV: production
      LOG_LEVEL: info
      DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      TARGET_DATE: ${{ github.event.inputs.target_date }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
      NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
      EMAIL_PROVIDER: ${{ secrets.EMAIL_PROVIDER }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      EMAIL_TO: ${{ secrets.EMAIL_TO }}
      EMAIL_API_KEY: ${{ secrets.EMAIL_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Run briefing pipeline
        run: npm start
