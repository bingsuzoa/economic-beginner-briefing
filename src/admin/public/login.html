<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin 로그인 - Economic Beginner Briefing</title>
  <link rel="stylesheet" href="/admin/css/styles.css">
</head>
<body>
  <div class="login-container">
    <div class="card">
      <h1>Admin Dashboard</h1>
      <p style="text-align:center; color: var(--color-text-secondary); margin-bottom: 24px;">
        Economic Beginner Briefing 관리자 페이지
      </p>
      <div id="error"></div>
      <div class="form-group">
        <label for="token">관리자 토큰</label>
        <input type="password" id="token" placeholder="인증 토큰을 입력하세요" autofocus>
      </div>
      <div class="form-group">
        <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">로그인</button>
      </div>
    </div>
  </div>

  <script src="/admin/js/api.js"></script>
  <script>
    document.getElementById('token').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const token = document.getElementById('token').value.trim();
      if (!token) {
        document.getElementById('error').innerHTML =
          '<div class="alert alert-error">토큰을 입력하세요.</div>';
        return;
      }

      setToken(token);

      try {
        await getStatus();
        window.location.href = '/admin/';
      } catch (err) {
        clearToken();
        document.getElementById('error').innerHTML =
          '<div class="alert alert-error">인증에 실패했습니다. 토큰을 확인하세요.</div>';
      }
    }
  </script>
</body>
</html>
