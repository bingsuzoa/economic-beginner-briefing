<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard - Economic Beginner Briefing</title>
  <link rel="stylesheet" href="/admin/css/styles.css">
</head>
<body>
  <div class="header">
    <h1>Economic Beginner Briefing - Admin</h1>
    <div class="header-actions">
      <button class="btn btn-sm" onclick="refresh()">새로고침</button>
      <button class="btn btn-sm btn-primary" id="runBtn" onclick="startRun()">지금 실행</button>
      <button class="btn btn-sm" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <div class="container">
    <div id="alert-area"></div>

    <!-- Status Cards -->
    <div class="status-grid" id="status-grid">
      <div class="status-card"><div class="label">서비스 상태</div><div class="value" id="svc-status">-</div></div>
      <div class="status-card"><div class="label">파이프라인</div><div class="value" id="pipeline-status">-</div></div>
      <div class="status-card"><div class="label">마지막 실행</div><div class="value" id="last-run-time" style="font-size:1rem">-</div></div>
      <div class="status-card"><div class="label">마지막 상태</div><div class="value" id="last-run-status">-</div></div>
    </div>

    <!-- Run History -->
    <div class="card">
      <div class="section-header">
        <h2>실행 이력</h2>
      </div>

      <div class="filters">
        <select id="filter-status" onchange="loadRuns()">
          <option value="">전체 상태</option>
          <option value="SUCCESS">성공</option>
          <option value="PARTIAL_SUCCESS">부분 성공</option>
          <option value="RUNNING">실행 중</option>
          <option value="FAILED">실패</option>
        </select>
        <select id="filter-trigger" onchange="loadRuns()">
          <option value="">전체 실행 방식</option>
          <option value="MANUAL">수동</option>
          <option value="SCHEDULER">스케줄러</option>
          <option value="GITHUB_ACTIONS">GitHub Actions</option>
          <option value="LOCAL">로컬</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>실행 ID</th>
              <th>시작 시각</th>
              <th>실행 방식</th>
              <th>상태</th>
              <th>소요시간</th>
              <th>수집</th>
              <th>AI 성공</th>
              <th>AI 실패</th>
              <th>발행 성공</th>
              <th>발행 실패</th>
            </tr>
          </thead>
          <tbody id="runs-body"></tbody>
        </table>
      </div>

      <div class="pagination" id="pagination"></div>
    </div>
  </div>

  <script src="/admin/js/api.js"></script>
  <script src="/admin/js/utils.js"></script>
  <script src="/admin/js/dashboard.js"></script>
</body>
</html>
